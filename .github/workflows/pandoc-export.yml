name: Pandoc Export
on:
  workflow_dispatch:
    inputs:
      filename:
        description: 'The markdown file to convert'
        required: true
        default: 'draft.md'
      template:
        description: 'The template to use (ieee, nature, arxiv)'
        required: true
        default: 'ieee'

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-latex-base texlive-fonts-recommended texlive-fonts-extra texlive-latex-extra

      - name: Generate PDF
        run: |
          pandoc "${{ github.event.inputs.filename }}" -o paper.pdf --pdf-engine=pdflatex

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: research-paper-pdf
          path: paper.pdf
